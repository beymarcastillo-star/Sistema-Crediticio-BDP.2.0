<html lang="es">

<style>

    --ink:        #0B1220;
    --ink-2:      #1A2236;
    --paper:      #F5F2EA;
    --paper-2:    #ECE6D6;
    --line:       #2A3550;
    --line-soft:  #C9C2B0;
    --navy:       #14305C;
    --navy-2:     #1E4582;
    --cyan:       #2BB3C0;
    --amber:      #E8A33D;
    --crimson:    #C0492B;
    --moss:       #5C7A3E;
    --violet:     #6B5BD2;
    --rose:       #C66B86;
  }
  [data-theme="dark"] {
    --ink:       #E7ECF5;
    --ink-2:     #B6C0D6;
    --paper:     #0A0F1C;
    --paper-2:   #11192C;
    --line:      #2C3A5C;
    --line-soft: #1B2540;
    --navy:      #6FA8FF;
    --navy-2:    #8FBCFF;
    --cyan:      #4DD3DF;
    --amber:     #F0B85A;
    --crimson:   #F08066;
    --moss:      #9CC074;
    --violet:    #9B8DE8;
    --rose:      #E89AAF;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    background: #0a0a0a;
    font-family: 'IBM Plex Sans', sans-serif;
    color: var(--ink);
    overflow: hidden;
    min-height: 100vh;
  }
  #stage {
    position: fixed; inset: 0;
    display: grid; place-items: center;
    background: #0a0a0a;
  }
  #poster {
    width: 1920px; height: 1080px;
    transform-origin: center center;
    background: var(--paper);
    position: relative;
    overflow: hidden;
  }
  .grid-bg {
    position: absolute; inset: 0;
    background-image:
      linear-gradient(to right, color-mix(in oklab, var(--line) 7%, transparent) 1px, transparent 1px),
      linear-gradient(to bottom, color-mix(in oklab, var(--line) 7%, transparent) 1px, transparent 1px),
      linear-gradient(to right, color-mix(in oklab, var(--line) 14%, transparent) 1px, transparent 1px),
      linear-gradient(to bottom, color-mix(in oklab, var(--line) 14%, transparent) 1px, transparent 1px);
    background-size: 24px 24px, 24px 24px, 120px 120px, 120px 120px;
    pointer-events: none;

  .layer { position: absolute; inset: 0; }
  .header {

    display: flex; align-items: flex-end; justify-content: space-between;

  .h-left .eyebrow {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 13px; letter-spacing: 0.18em;
    text-transform: uppercase; color: var(--ink-2); margin-bottom: 6px;

  .h-left h1 {
    font-family: 'Fraunces', serif; font-weight: 600; font-size: 56px;

  .h-left h1 .accent { color: var(--navy); font-style: italic; }
  .h-left .sub { margin-top: 10px; font-size: 18px; color: var(--ink-2); max-width: 720px; }
  .h-right {
    text-align: right; font-family: 'IBM Plex Mono', monospace;
    font-size: 12px; color: var(--ink-2); letter-spacing: 0.08em;

  .h-right .stamp {
    display: inline-block; padding: 6px 12px;

  .footer .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--navy); }

    position: absolute; background: var(--paper); border: 1.5px solid var(--line);
    border-radius: 6px; padding: 14px 16px 12px 16px; cursor: pointer;

    border-color: var(--navy);

    color: var(--ink-2); letter-spacing: 0.04em; margin-bottom: 4px;

  .stereo::after  { content: "»"; margin-left: 1px; }

  .node .pills { margin-top: 10px; display: flex; flex-wrap: wrap; gap: 4px; }

    font-family: 'IBM Plex Mono', monospace; font-size: 10px; padding: 2px 6px;

    border: 1px solid color-mix(in oklab, var(--navy) 20%, transparent);

  .node[data-cat="data"]     { border-left: 4px solid var(--moss); }
  .node[data-cat="external"] { border-left: 4px solid var(--amber); }

    letter-spacing: 0.12em; text-transform: uppercase; color: var(--ink-2);

  .device .device-label .num { color: var(--navy); font-weight: 700; margin-right: 6px; }
  .edges path { fill: none; stroke: color-mix(in oklab, var(--line) 70%, transparent); stroke-width: 1.5; }
  .edges path.https { stroke: var(--navy); }
  .edges path.tls { stroke: var(--crimson); stroke-dasharray: 6 4; }
  .edges path.tcp { stroke: var(--moss); }
  .edges path.async { stroke: var(--amber); stroke-dasharray: 2 4; }
  .edges path.replication { stroke: var(--violet); stroke-dasharray: 8 4 2 4; }

  .packet.tcp { fill: var(--moss); }
  .packet.async { fill: var(--amber); }
  .packet.replication { fill: var(--violet); }
  .packet.tls { fill: var(--crimson); }

  .panel .panel-close {

  .legend {

  .legend-line { width:28px; height:2px; }
  .legend-line.https { background:var(--navy); }
  .legend-line.tls { background:repeating-linear-gradient(to right,var(--crimson) 0 6px,transparent 6px 10px); }

  .legend-line.async { background:repeating-linear-gradient(to right,var(--amber) 0 2px,transparent 2px 6px); }
  .legend-line.replication { background:repeating-linear-gradient(to right,var(--violet) 0 8px,transparent 8px 12px,var(--violet) 12px 14px,transparent 14px 18px); }

  .reg-mark.tl { top:24px; left:24px; border-right:none; border-bottom:none; }
  .reg-mark.tr { top:24px; right:24px; border-left:none; border-bottom:none; }
  .reg-mark.bl { bottom:24px; left:24px; border-right:none; border-top:none; }
  .reg-mark.br { bottom:24px; right:24px; border-left:none; border-top:none; }
  .hidden-layer { opacity:0.08 !important; pointer-events:none; transition:opacity .3s; }

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" crossorigin="anonymous"></script>

<script>
(function() {
  function fit() {
    var poster = document.getElementById('poster');
    if (!poster) return;
    var sw = window.innerWidth, sh = window.innerHeight;
    if (sw < 2 || sh < 2) { requestAnimationFrame(fit); return; }
    var scale = Math.min(sw / 1920, sh / 1080);
    poster.style.transform = 'scale(' + scale + ')';
  }
  window.addEventListener('resize', fit);
  window.addEventListener('load', fit);
  if (window.ResizeObserver) new ResizeObserver(fit).observe(document.documentElement);
  requestAnimationFrame(fit);
  fit();
})();
</script>

<script type="text/babel">
/* ═══════════════════════════════════════════
   1. TWEAKS PANEL
═══════════════════════════════════════════ */
const __TWEAKS_STYLE = `
  .twk-panel{position:fixed;right:16px;bottom:16px;z-index:2147483646;width:280px;
    max-height:calc(100vh - 32px);display:flex;flex-direction:column;

  .twk-hd{display:flex;align-items:center;justify-content:space-between;

  .twk-hd b{font-size:12px;font-weight:600;letter-spacing:.01em}
  .twk-x{appearance:none;border:0;background:transparent;color:rgba(41,38,27,.55);
    width:22px;height:22px;border-radius:6px;cursor:pointer;font-size:13px;line-height:1}
  .twk-x:hover{background:rgba(0,0,0,.06);color:#29261b}
  .twk-body{padding:2px 14px 14px;display:flex;flex-direction:column;gap:10px;

  .twk-row{display:flex;flex-direction:column;gap:5px}
  .twk-row-h{flex-direction:row;align-items:center;justify-content:space-between;gap:10px}
  .twk-lbl{display:flex;justify-content:space-between;align-items:baseline;color:rgba(41,38,27,.72)}

  .twk-seg-thumb{position:absolute;top:2px;bottom:2px;border-radius:6px;
    background:rgba(255,255,255,.9);box-shadow:0 1px 2px rgba(0,0,0,.12);
    transition:left .15s cubic-bezier(.3,.7,.4,1),width .15s}

    background:transparent;color:inherit;font:inherit;font-weight:500;min-height:22px;
    border-radius:6px;cursor:pointer;padding:4px 6px;line-height:1.2}
  .twk-toggle{position:relative;width:32px;height:18px;border:0;border-radius:999px;
    background:rgba(0,0,0,.15);transition:background .15s;cursor:pointer;padding:0}
  .twk-toggle[data-on="1"]{background:#34c759}
  .twk-toggle i{position:absolute;top:2px;left:2px;width:14px;height:14px;border-radius:50%;
    background:#fff;box-shadow:0 1px 2px rgba(0,0,0,.25);transition:transform .15s}
  .twk-toggle[data-on="1"] i{transform:translateX(14px)}
`;

function useTweaks(defaults) {
  const [values, setValues] = React.useState(defaults);
  const setTweak = React.useCallback((keyOrEdits, val) => {
    const edits = typeof keyOrEdits === 'object' && keyOrEdits !== null
      ? keyOrEdits : { [keyOrEdits]: val };
    setValues((prev) => ({ ...prev, ...edits }));
  }, []);
  return [values, setTweak];
}

function TweaksPanel({ title = 'Tweaks', children }) {
  const [open, setOpen] = React.useState(true);
  const dragRef = React.useRef(null);
  const offsetRef = React.useRef({ x: 16, y: 16 });
  const PAD = 16;

  const clampToViewport = React.useCallback(() => {
    const panel = dragRef.current;
    if (!panel) return;
    const w = panel.offsetWidth, h = panel.offsetHeight;
    const maxRight  = Math.max(PAD, window.innerWidth  - w - PAD);
    const maxBottom = Math.max(PAD, window.innerHeight - h - PAD);
    offsetRef.current = {
      x: Math.min(maxRight,  Math.max(PAD, offsetRef.current.x)),
      y: Math.min(maxBottom, Math.max(PAD, offsetRef.current.y)),
    };
    panel.style.right  = offsetRef.current.x + 'px';
    panel.style.bottom = offsetRef.current.y + 'px';
  }, []);

  React.useEffect(() => {
    if (!open) return;
    clampToViewport();
    const ro = typeof ResizeObserver !== 'undefined'
      ? new ResizeObserver(clampToViewport) : null;
    if (ro) ro.observe(document.documentElement);
    else window.addEventListener('resize', clampToViewport);
    return () => { if (ro) ro.disconnect(); else window.removeEventListener('resize', clampToViewport); };
  }, [open, clampToViewport]);

  const onDragStart = (e) => {
    const panel = dragRef.current;
    if (!panel) return;
    const r = panel.getBoundingClientRect();
    const sx = e.clientX, sy = e.clientY;
    const startRight  = window.innerWidth  - r.right;
    const startBottom = window.innerHeight - r.bottom;
    const move = (ev) => {
      offsetRef.current = { x: startRight - (ev.clientX - sx), y: startBottom - (ev.clientY - sy) };
      clampToViewport();
    };
    const up = () => { window.removeEventListener('mousemove', move); window.removeEventListener('mouseup', up); };
    window.addEventListener('mousemove', move);
    window.addEventListener('mouseup', up);
  };

  if (!open) return (
    <button onClick={() => setOpen(true)}
      style={{ position:'fixed', right:16, bottom:16, zIndex:9999, padding:'8px 14px',
               background:'rgba(20,48,92,.9)', color:'#fff', border:'none', borderRadius:10,
               fontFamily:'IBM Plex Mono, monospace', fontSize:12, cursor:'pointer',
               backdropFilter:'blur(12px)' }}>
      ⚙ Tweaks
    </button>
  );

  return (
    <>
      <style>{__TWEAKS_STYLE}</style>
      <div ref={dragRef} className="twk-panel" style={{ right: offsetRef.current.x, bottom: offsetRef.current.y }}>
        <div className="twk-hd" onMouseDown={onDragStart}>
          <b>{title}</b>
          <button className="twk-x" onClick={() => setOpen(false)}>✕</button>
        </div>
        <div className="twk-body">{children}</div>
      </div>
    </>
  );
}

function TweakSection({ label, title, children }) {
  return (
    <>
      <div className="twk-sect">{label || title}</div>
      {children}
    </>
  );
}

function TweakRadio({ label, value, options, onChange }) {
  const trackRef = React.useRef(null);
  const opts = options.map((o) => (typeof o === 'object' ? o : { value: o, label: o }));
  const idx = Math.max(0, opts.findIndex((o) => o.value === value));
  const n = opts.length;
  return (
    <div className="twk-row">
      <div className="twk-lbl"><span>{label}</span></div>
      <div ref={trackRef} className="twk-seg">
        <div className="twk-seg-thumb"
             style={{ left: `calc(2px + ${idx} * (100% - 4px) / ${n})`, width: `calc((100% - 4px) / ${n})` }} />
        {opts.map((o) => (
          <button key={o.value} type="button" onClick={() => onChange(o.value)}>{o.label}</button>
        ))}
      </div>
    </div>
  );
}

function TweakToggle({ label, value, onChange }) {
  return (
    <div className="twk-row twk-row-h">
      <div className="twk-lbl"><span>{label}</span></div>
      <button type="button" className="twk-toggle" data-on={value ? '1' : '0'}
              onClick={() => onChange(!value)}><i /></button>
    </div>
  );
}

const { useState, useEffect, useMemo } = React;

const TWEAK_DEFAULTS = { theme:"light", showFlow:true, showLayer_client:true, showLayer_edge:true, showLayer_app:true, showLayer_data:true, showLayer_external:true, showLayer_security:true, edgeStyle:"orthogonal" };

function nodeById(id) { return NODES.find(n => n.id === id); }

function getAnchor(node, side) {
  const cx = node.x + node.w / 2, cy = node.y + node.h / 2;
  switch (side) {
    case "left":   return { x: node.x,          y: cy };
    case "right":  return { x: node.x + node.w, y: cy };
    case "top":    return { x: cx,              y: node.y };
    case "bottom": return { x: cx,              y: node.y + node.h };
    default:       return { x: cx,              y: cy };
  }
}

function pickAnchors(a, b) {
  const ax = a.x + a.w/2, ay = a.y + a.h/2;
  const bx = b.x + b.w/2, by = b.y + b.h/2;
  const dx = bx-ax, dy = by-ay;
  if (Math.abs(dx) >= Math.abs(dy)) {
    return dx >= 0 ? [getAnchor(a,"right"), getAnchor(b,"left")] : [getAnchor(a,"left"), getAnchor(b,"right")];
  } else {
    return dy >= 0 ? [getAnchor(a,"bottom"), getAnchor(b,"top")] : [getAnchor(a,"top"), getAnchor(b,"bottom")];
  }
}

function orthogonalPath(p1, p2) {
  const r=8, dx=p2.x-p1.x, dy=p2.y-p1.y;
  if (Math.abs(dx) > Math.abs(dy)) {
    const midX = p1.x + dx/2;
    return `M ${p1.x},${p1.y} L ${midX-Math.sign(dx)*r},${p1.y} Q ${midX},${p1.y} ${midX},${p1.y+Math.sign(dy)*r} L ${midX},${p2.y-Math.sign(dy)*r} Q ${midX},${p2.y} ${midX+Math.sign(dx)*r},${p2.y} L ${p2.x},${p2.y}`;
  } else {
    const midY = p1.y + dy/2;
    return `M ${p1.x},${p1.y} L ${p1.x},${midY-Math.sign(dy)*r} Q ${p1.x},${midY} ${p1.x+Math.sign(dx)*r},${midY} L ${p2.x-Math.sign(dx)*r},${midY} Q ${p2.x},${midY} ${p2.x},${midY+Math.sign(dy)*r} L ${p2.x},${p2.y}`;
  }
}

function curvedPath(p1, p2) {
  const dx=p2.x-p1.x;
  return `M ${p1.x},${p1.y} C ${p1.x+dx*.5},${p1.y} ${p2.x-dx*.5},${p2.y} ${p2.x},${p2.y}`;
}

function midPoint(p1, p2) { return { x:(p1.x+p2.x)/2, y:(p1.y+p2.y)/2 }; }

function NodeCard({ node, onClick, active, dimmed }) {

}

function EdgesLayer({ tweaks, hoveredId, activeId }) {
  const edgePaths = useMemo(() => {
    return EDGES.map((e,i) => {
      const a = nodeById(e.from), b = nodeById(e.to);
      if (!a || !b) return null;
      const [p1,p2] = pickAnchors(a,b);
      const d = tweaks.edgeStyle === "curved" ? curvedPath(p1,p2) : orthogonalPath(p1,p2);
      return { ...e, idx:i, p1, p2, d, mid:midPoint(p1,p2) };
    }).filter(Boolean);
  }, [tweaks.edgeStyle]);

  const isHidden = (cat) => !tweaks[`showLayer_${cat}`];

  return (
    <svg className="layer edges" width="1920" height="1080" viewBox="0 0 1920 1080" style={{ pointerEvents:"none" }}>
      <defs>
        {["https","tcp","tls","async","replication"].map(t => (
          <marker key={t} id={`arr-${t}`} viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
            <path d="M0,0 L10,5 L0,10 z" fill={t==="https"?"var(--navy)":t==="tcp"?"var(--moss)":t==="tls"?"var(--crimson)":t==="async"?"var(--amber)":"var(--violet)"} />
          </marker>
        ))}
      </defs>
      {edgePaths.map((e) => {
        const fn = nodeById(e.from), tn = nodeById(e.to);
        const dim = isHidden(fn.cat) || isHidden(tn.cat);
        const hi = hoveredId && (e.from===hoveredId || e.to===hoveredId);
        const ac = activeId  && (e.from===activeId  || e.to===activeId);
        const opacity = dim ? 0.08 : (hoveredId||activeId ? (hi||ac?1:0.18) : 0.85);
        return (
          <g key={`p-${e.idx}`} style={{ opacity, transition:"opacity .25s" }}>
            <path d={e.d} className={e.type} markerEnd={`url(#arr-${e.type})`} strokeWidth={hi||ac?2.2:1.5} />
          </g>
        );
      })}
      {edgePaths.map((e) => {
        const fn = nodeById(e.from), tn = nodeById(e.to);
        if (isHidden(fn.cat)||isHidden(tn.cat)) return null;
        return (
          <text key={`l-${e.idx}`} x={e.mid.x} y={e.mid.y-2} className="edge-label" textAnchor="middle">{e.label}</text>
        );
      })}
      {tweaks.showFlow && edgePaths.map((e) => {
        const fn = nodeById(e.from), tn = nodeById(e.to);
        if (isHidden(fn.cat)||isHidden(tn.cat)) return null;
        const dur = 4+(e.idx%5)*.6, delay=(e.idx*.3)%4;
        return (
          <circle key={`pk-${e.idx}`} r="3.5" className={`packet ${e.type}`}>
            <animateMotion dur={`${dur}s`} begin={`${delay}s`} repeatCount="indefinite" path={e.d} rotate="auto" />
          </circle>
        );
      })}
    </svg>
  );
}

function DetailPanel({ node, onClose }) {
  if (!node) return null;
  const catLabel = ({client:"Capa Cliente",edge:"Edge / Red",app:"Aplicación",data:"Datos",external:"Externo",security:"Seguridad"})[node.cat] || node.cat;
  return (
    <div className="panel" key={node.id}>
      <button className="panel-close" onClick={onClose}>×</button>
      <div className="panel-stereo">«{node.stereo}»</div>
      <h3>{node.title}</h3>
      <div className="panel-cat">Categoría · {catLabel}</div>
      {node.detail?.role && <div style={{ fontSize:13, color:"var(--ink)", lineHeight:1.5 }}>{node.detail.role}</div>}
      {node.detail?.tech && (
        <div className="panel-section">
          <h4>Especificación técnica</h4>
          {node.detail.tech.map(([k,v],i) => (
            <div key={i} className="kv"><span className="k">{k}</span><span className="v">{v}</span></div>
          ))}
        </div>
      )}
      {node.detail?.notes?.length > 0 && (
        <div className="panel-section">
          <h4>Notas de despliegue</h4>
          <ul>{node.detail.notes.map((n,i) => <li key={i}>{n}</li>)}</ul>
        </div>
      )}
      {node.detail?.hus?.length > 0 && (
        <div className="panel-section">
          <h4>Historias de Usuario</h4>
          <div style={{ display:"flex", flexWrap:"wrap", gap:6 }}>
            {node.detail.hus.map((h,i) => <span key={i} className="pill">{h}</span>)}
          </div>
        </div>
      )}
    </div>
  );
}

function App() {
  const [tweaks, setTweak] = useTweaks(TWEAK_DEFAULTS);
  const [activeNodeId, setActiveNodeId] = useState(null);
  const [hoveredId, setHoveredId] = useState(null);

  useEffect(() => {
    document.documentElement.setAttribute("data-theme", tweaks.theme);
  }, [tweaks.theme]);

  const activeNode = activeNodeId ? nodeById(activeNodeId) : null;
  const isHidden = (cat) => !tweaks[`showLayer_${cat}`];
  const deviceDimmed = (id) => {
    if (id==="d-edge") return isHidden("edge") && isHidden("security");
    if (id==="d-ext")  return isHidden("external") && isHidden("data");
    const map = {"d-clients":"client","d-app":"app","d-data":"data"};
    return isHidden(map[id]);
  };

  return (
    <>
      <div className="grid-bg" />
      <div className="reg-mark tl"/><div className="reg-mark tr"/>
      <div className="reg-mark bl"/><div className="reg-mark br"/>

      <div className="header">
        <div className="h-left">
          <div className="eyebrow">UML · Deployment Diagram · v3.0</div>
          <h1>Diagrama de <span className="accent">Despliegue</span></h1>
          <div className="sub">Banco de Desarrollo Productivo S.A.M. — Sistema de gestión crediticia agropecuaria. Arquitectura monolítica modular · Node.js · PostgreSQL · PWA offline.</div>
        </div>
        <div className="h-right">
          <div className="stamp">BDP · Crédito</div>
          <div className="meta-line">DOC-ARQ-DEP · 04 / 2026</div>
          <div className="meta-line">B. CASTILLO C. · P2</div>
          <div className="meta-line">UAB · ING. SOFTWARE</div>
        </div>
      </div>

      {DEVICES.map(d => <DeviceShell key={d.id} device={d} dimmed={deviceDimmed(d.id)} />)}

      <EdgesLayer tweaks={tweaks} hoveredId={hoveredId} activeId={activeNodeId} />

      {NODES.map(n => (
        <div key={n.id} onMouseEnter={() => setHoveredId(n.id)} onMouseLeave={() => setHoveredId(null)}
             style={{ position:"absolute", left:0, top:0, width:"100%", height:"100%", pointerEvents:"none" }}>
          <div style={{ pointerEvents:"auto" }}>
            <NodeCard node={n} onClick={(node) => setActiveNodeId(node.id===activeNodeId?null:node.id)}
                      active={n.id===activeNodeId} dimmed={isHidden(n.cat)} />
          </div>
        </div>
      ))}

      {activeNode && <DetailPanel node={activeNode} onClose={() => setActiveNodeId(null)} />}

      <div className="legend">
        <div className="legend-item"><div className="legend-line https"></div>HTTPS · REST</div>
        <div className="legend-item"><div className="legend-line tls"></div>TLS · mTLS</div>
        <div className="legend-item"><div className="legend-line tcp"></div>TCP / SQL</div>
        <div className="legend-item"><div className="legend-line async"></div>Async · Cron</div>
        <div className="legend-item"><div className="legend-line replication"></div>Replicación</div>
      </div>

      <div className="footer">
        <div className="corner"><div className="dot"></div><span>BANCO DE DESARROLLO PRODUCTIVO · S.A.M.</span></div>
        <div className="corner"><span>HU-01 → HU-12 · 6 Épicas · 8 Módulos · 500 usuarios concurrentes</span></div>
        <div className="corner"><span>P. 01 / 01</span><div className="dot"></div></div>
      </div>

      <TweaksPanel title="⚙ Controles">
        <TweakSection label="Tema">
          <TweakRadio label="Modo" value={tweaks.theme} onChange={(v) => setTweak("theme",v)}
            options={[{value:"light",label:"Claro"},{value:"dark",label:"Oscuro"}]} />
        </TweakSection>
        <TweakSection label="Conexiones">
          <TweakRadio label="Estilo" value={tweaks.edgeStyle} onChange={(v) => setTweak("edgeStyle",v)}
            options={[{value:"orthogonal",label:"Ortogonal"},{value:"curved",label:"Curvas"}]} />
          <TweakToggle label="Animación de flujo" value={tweaks.showFlow} onChange={(v) => setTweak("showFlow",v)} />
        </TweakSection>
        <TweakSection label="Capas visibles">
          <TweakToggle label="01 · Cliente"  value={tweaks.showLayer_client}   onChange={(v) => setTweak("showLayer_client",v)} />
          <TweakToggle label="02 · Edge"     value={tweaks.showLayer_edge}     onChange={(v) => setTweak("showLayer_edge",v)} />
          <TweakToggle label="03 · App"      value={tweaks.showLayer_app}      onChange={(v) => setTweak("showLayer_app",v)} />
          <TweakToggle label="04 · Datos"    value={tweaks.showLayer_data}     onChange={(v) => setTweak("showLayer_data",v)} />
          <TweakToggle label="05 · Externos" value={tweaks.showLayer_external} onChange={(v) => setTweak("showLayer_external",v)} />
        </TweakSection>
      </TweaksPanel>
    </>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<App />);
</script>
</body>
</html>
